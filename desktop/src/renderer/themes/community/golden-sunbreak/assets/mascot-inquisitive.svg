  <circle cx="8.9"  cy="10.2" r="0.82" fill="#2a1004"/>
  <circle cx="13.3" cy="10.2" r="0.82" fill="#2a1004"/>
  <!-- Golden reflection flares -->
  <circle cx="9.35"  cy="9.80" r="0.28" fill="#ffc030" opacity="0.9"/>
  <circle cx="13.75" cy="9.80" r="0.28" fill="#ffc030" opacity="0.9"/>
