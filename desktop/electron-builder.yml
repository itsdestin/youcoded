appId: com.youcoded.desktop
productName: YouCoded
directories:
  output: release
  buildResources: assets
win:
  target: nsis
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
linux:
  target: AppImage
  category: Development
npmRebuild: false
asarUnpack:
  - dist/main/pty-worker.js
  - scripts/**/*
  - hook-scripts/**/*
files:
  - dist/**/*
  - node_modules/**/*
  - scripts/**/*
  - hook-scripts/**/*
  - assets/**/*
  - package.json
