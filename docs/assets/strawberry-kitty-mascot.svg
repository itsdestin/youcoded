<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Strawberry Kitty · idle · squinting >< eyes, small smile -->
  <!-- Body: white fill with currentColor outline -->
  <path d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z"
        fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Cat ear tips (Hello Kitty silhouette) -->
  <path d="M6 4.3 L6.8 1.8 L9 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <path d="M18 4.3 L17.2 1.8 L15 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Arms -->
  <rect x="1" y="9" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <rect x="20" y="9" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Legs -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Squinting >< eyes -->
  <path d="M7.5 9.2 L10 10.2 L7.5 11.2" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16.5 9.2 L14 10.2 L16.5 11.2" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny yellow oval nose -->
  <ellipse cx="12" cy="11.2" rx="0.5" ry="0.35" fill="#F7C948"/>
  <!-- Tiny smile -->
  <path d="M11 12.6 Q12 13.4 13 12.6" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers (3 per side) -->
  <g stroke="currentColor" stroke-width="0.4" stroke-linecap="round">
    <line x1="5.5" y1="10.5" x2="7" y2="10.5"/>
    <line x1="5.5" y1="11.5" x2="7" y2="11.5"/>
    <line x1="17" y1="10.5" x2="18.5" y2="10.5"/>
    <line x1="17" y1="11.5" x2="18.5" y2="11.5"/>
  </g>
  <!-- Strawberry on left ear (red body, tiny seeds, green leaf) -->
  <path d="M6.7 5.2 Q6 6 6.2 6.8 Q6.6 7.6 7.4 7.5 Q8 7.2 8.1 6.3 Q8 5.4 7.4 5.1 Z" fill="#E14560"/>
  <path d="M6.5 5.1 L7.6 4.9 L7.5 5.4 L6.9 5.5 Z" fill="#6DB56D"/>
  <circle cx="6.8" cy="6.0" r="0.1" fill="#FFF2A8"/>
  <circle cx="7.4" cy="6.0" r="0.1" fill="#FFF2A8"/>
  <circle cx="7.1" cy="6.6" r="0.1" fill="#FFF2A8"/>
</svg>
