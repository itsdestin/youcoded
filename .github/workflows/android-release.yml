name: Android Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build React UI
        run: ./scripts/build-web-ui.sh

      - name: Create keystore.properties
        run: |
          echo "storeFile=release-keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=destincode" >> keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: destincode-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: destincode-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
